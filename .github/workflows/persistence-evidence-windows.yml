name: persistence-evidence-windows

on:
  workflow_dispatch:
  push:
    paths:
      - "src/persistence_evidence/**"
      - "tests/persistence_candidates.rs"
      - "Cargo.toml"
      - ".github/workflows/persistence-evidence-windows.yml"

jobs:
  windows-evidence:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run persistence candidate tests
        run: cargo test --features persistence-spike --test persistence_candidates
      - name: Run evidence runner
        run: cargo run --features persistence-spike --bin persistence_evidence_run
        env:
          VOXPROOF_EVIDENCE_RUN_ID: spike-v1-windows-ci
      - name: Upload Windows evidence summary
        uses: actions/upload-artifact@v4
        with:
          name: persistence-evidence-windows
          path: evidence/persistence/spike-v1-windows-ci/
